<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001830"/>
      <stop offset="100%" stop-color="#000810"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00cfff" stroke-width="3" opacity="0.35"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#00cfff" stroke-width="3" opacity="0.5">
    <line x1="256" y1="36" x2="256" y2="60"/>
    <line x1="256" y1="452" x2="256" y2="476"/>
    <line x1="36" y1="256" x2="60" y2="256"/>
    <line x1="452" y1="256" x2="476" y2="256"/>
    <line x1="100" y1="100" x2="118" y2="118"/>
    <line x1="394" y1="394" x2="412" y2="412"/>
    <line x1="412" y1="100" x2="394" y2="118"/>
    <line x1="118" y1="394" x2="100" y2="412"/>
  </g>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00cfff" stroke-width="2" opacity="0.25"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.4"/>

  <!-- Hex segments on inner ring -->
  <g stroke="#00cfff" stroke-width="2" opacity="0.6">
    <line x1="256" y1="156" x2="256" y2="136"/>
    <line x1="256" y1="356" x2="256" y2="376"/>
    <line x1="156" y1="256" x2="136" y2="256"/>
    <line x1="356" y1="256" x2="376" y2="256"/>
  </g>

  <!-- Arc reactor glow -->
  <circle cx="256" cy="256" r="85" fill="#001a35" opacity="0.8"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#00cfff" stroke-width="2" opacity="0.5"/>

  <!-- Core glow effect -->
  <circle cx="256" cy="256" r="55" fill="#00cfff" opacity="0.08"/>
  <circle cx="256" cy="256" r="42" fill="url(#core)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="28" fill="white" opacity="0.95"/>

  <!-- J letter -->
  <text x="256" y="278" font-family="Georgia, serif" font-size="52" font-weight="bold"
    fill="#000810" text-anchor="middle" letter-spacing="-2">J</text>

  <!-- Bottom text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
    fill="#00cfff" text-anchor="middle" opacity="0.6" letter-spacing="8">JARVIS</text>
</svg>
